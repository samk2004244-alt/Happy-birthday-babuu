<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Happy Birthday Sachinn ❤️</title><style>body{font-family:Arial,sans-serif;background:linear-gradient(#dff4ff,#fff);display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.c{background:#fff;padding:30px;border-radius:20px;max-width:700px;text-align:center;box-shadow:0 4px 18px #0002}h1{color:#2b7de9}#cd{font-size:28px;color:#2b7de9;font-weight:bold}.heart{position:fixed;bottom:-20px;animation:f 8s linear infinite}@keyframes f{to{transform:translateY(-110vh);opacity:0}}</style></head><body><div class="c"><h1>Happy Birthday 💙</h1><h2>Sachinn ❤️</h2><p>Every day with you is special. I hope your birthday is filled with love, laughter and happiness. Happy Birthday, my baby! 💙</p><div id="cd"></div><button onclick="document.getElementById('m').play()">🎵 Play Music</button><audio id="m" controls style="display:none"><source src="music.mp3"></audio></div><script>
let b=new Date("2026-07-07T00:00:00").getTime();setInterval(()=>{let d=b-Date.now();let D=Math.floor(d/86400000),H=Math.floor(d%86400000/3600000),M=Math.floor(d%3600000/60000),S=Math.floor(d%60000/1000);cd.innerHTML=D+"d "+H+"h "+M+"m "+S+"s";},1000);
setInterval(()=>{let e=document.createElement("div");e.className="heart";e.innerHTML="💙";e.style.left=Math.random()*100+"vw";document.body.appendChild(e);setTimeout(()=>e.remove(),8000)},500);
</script></body></html>
